<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 등급 계산기</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px;
            color: #111827;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }

        .ratio-info {
            background-color: #f1f5f9;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 24px;
            color: #475569;
            font-weight: 500;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* 스크롤 화살표 제거 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn-calc {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-calc:hover {
            background-color: var(--primary-hover);
        }

        .result-card {
            margin-top: 28px;
            padding: 20px;
            background-color: #eff6ff;
            border-radius: 12px;
            border: 1px solid #bfdbfe;
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed #bfdbfe;
        }

        .result-label {
            font-size: 15px;
            color: #1e40af;
        }

        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a8a;
        }

        .grade-value {
            font-size: 24px;
            font-weight: 800;
            color: #2563eb;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>영어 등급 계산기</h1>
    <div class="subtitle">반영 비율 안내</div>
    
    <div class="ratio-info">
        💡 모든 점수를 정확하게 입력해주세요. 💡
    </div>
    
    <div class="input-group">
        <label for="midterm">1차 정기고사 점수 (100점 만점)</label>
        <input type="number" id="midterm" min="0" max="100" step="0.01" placeholder="예: 85.5" oninput="hideResult()">
    </div>
    
    <div class="input-group">
        <label for="final">2차 정기고사 점수 (100점 만점)</label>
        <input type="number" id="final" min="0" max="100" step="0.01" placeholder="예: 78" oninput="hideResult()">
    </div>
    
    <div class="input-group">
        <label for="performance">수행평가 점수 (40점 만점)</label>
        <input type="number" id="performance" min="0" max="40" step="0.01" placeholder="예: 38" oninput="hideResult()">
    </div>
    
    <button class="btn-calc" onclick="calculate()">등급 계산하기</button>

    <div class="result-card" id="resultCard">
        <div class="result-row">
            <span class="result-label">총 원점수</span>
            <span class="result-value"><span id="totalScore">0</span>점</span>
        </div>
        <div class="result-row">
            <span class="result-label">예상 등급</span>
            <span class="grade-value" id="gradeResult">-</span>
        </div>
    </div>
</div>

<script>
    function calculate() {
        const midterm = parseFloat(document.getElementById('midterm').value) || 0;
        const finalExam = parseFloat(document.getElementById('final').value) || 0;
        const performance = parseFloat(document.getElementById('performance').value) || 0;

        // 지필은 0.3 곱하기, 수행은 그대로(원점수) 더하기
        let total = (midterm * 0.3) + (finalExam * 0.3) + performance;
        
        // 소수점 둘째자리 반올림
        total = Math.round(total * 100) / 100;

        let grade = "";
        
        // 등급 판단 로직
        if (total > 88.63) {
            grade = "1등급 (상위 10%)";
        } else if (total > 74.03) {
            grade = "2등급 (상위 34%)";
        } else if (total > 52.5) {
            grade = "3등급 (상위 66%)";
        } else if (total > 42.07) {
            grade = "4등급 (상위 90%)";
        } else {
            grade = "5등급 (상위 100%)";
        }

        // 결과 화면에 표시
        document.getElementById('totalScore').innerText = total;
        document.getElementById('gradeResult').innerText = grade;
        document.getElementById('resultCard').style.display = 'block';

        // [수정사항 1] 계산 완료 후 입력창 값 비우기
        document.getElementById('midterm').value = "";
        document.getElementById('final').value = "";
        document.getElementById('performance').value = "";
    }

    // [수정사항 2] 새로운 사용자가 값을 입력하기 시작하면 기존 결과창 숨기기
    function hideResult() {
        document.getElementById('resultCard').style.display = 'none';
    }
</script>

</body>
</html>
